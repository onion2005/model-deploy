Description:
  This template is built and deployed by the infrastructure pipeline in various stages (staging/production) as required.
  It specifies the resources that need to be created, like the SageMaker Endpoint, auto-scaling policy,
  CloudWatch alarms, and an optional Model Monitor schedule.

Parameters:
  SageMakerProjectName:
    Type: String
    Description: Name of the project
    MinLength: 1
    MaxLength: 32
    AllowedPattern: ^[a-zA-Z](-*[a-zA-Z0-9])*
  ModelExecutionRoleArn:
    Type: String
    Description: Execution role used for deploying the model.
  ModelPackageName:
    Type: String
    Description: The trained Model Package ARN.
  StageName:
    Type: String
    Description: The name for a project pipeline stage, such as staging or prod.
  EndpointInstanceCount:
    Type: Number
    Description: Minimum (and initial) number of instances for the endpoint.
    MinValue: 1
  EndpointMaxInstanceCount:
    Type: Number
    Description: Maximum number of instances for auto-scaling.
    MinValue: 1
  EndpointInstanceType:
    Type: String
    Description: The ML compute instance type for the endpoint.
  TargetInvocationsPerInstance:
    Type: Number
    Description: Target invocations per instance per minute used by the auto-scaling policy.
    Default: 70
  DataCaptureUploadPath:
    Type: String
    Description: The S3 path to which captured request/response data is uploaded.
  SamplingPercentage:
    Type: Number
    Description: Percentage of invocations to capture for data monitoring.
    MinValue: 0
    MaxValue: 100
  EnableDataCapture:
    Type: String
    Description: Enable data capture on the endpoint.
    Default: "true"
    AllowedValues: ["true", "false"]
  AlarmEmail:
    Type: String
    Description: Email address for CloudWatch alarm notifications. Leave empty to skip SNS setup.
    Default: ""
  BaselineConstraintsUri:
    Type: String
    Description: >
      S3 URI for Model Monitor baseline constraints JSON (generated by a baseline job).
      Leave empty to skip the monitoring schedule.
    Default: ""
  BaselineStatisticsUri:
    Type: String
    Description: >
      S3 URI for Model Monitor baseline statistics JSON (generated by a baseline job).
      Leave empty to skip the monitoring schedule.
    Default: ""
  ModelMonitorImageUri:
    Type: String
    Description: >
      SageMaker Model Monitor container image URI for your deployment region.
      Find the correct URI for your region at:
      https://docs.aws.amazon.com/sagemaker/latest/dg/model-monitor-pre-built-container.html
      Or retrieve it via: sagemaker.image_uris.retrieve("model-monitor", boto3.Session().region_name)
    Default: ""

Conditions:
  HasAlarmEmail: !Not [!Equals [!Ref AlarmEmail, ""]]
  HasBaseline: !And
    - !Not [!Equals [!Ref BaselineConstraintsUri, ""]]
    - !Not [!Equals [!Ref BaselineStatisticsUri, ""]]

Resources:

  # ── Endpoint ──────────────────────────────────────────────────────────────

  Model:
    Type: AWS::SageMaker::Model
    Properties:
      Containers:
        - ModelPackageName: !Ref ModelPackageName
      ExecutionRoleArn: !Ref ModelExecutionRoleArn

  EndpointConfig:
    Type: AWS::SageMaker::EndpointConfig
    Properties:
      ProductionVariants:
        - InitialInstanceCount: !Ref EndpointInstanceCount
          InitialVariantWeight: 1.0
          InstanceType: !Ref EndpointInstanceType
          ModelName: !GetAtt Model.ModelName
          VariantName: AllTraffic
      DataCaptureConfig:
        EnableCapture: !Ref EnableDataCapture
        InitialSamplingPercentage: !Ref SamplingPercentage
        DestinationS3Uri: !Ref DataCaptureUploadPath
        CaptureOptions:
          - CaptureMode: Input
          - CaptureMode: Output
        CaptureContentTypeHeader:
          CsvContentTypes:
            - "text/csv"

  Endpoint:
    Type: AWS::SageMaker::Endpoint
    Properties:
      EndpointName: !Sub ${SageMakerProjectName}-${StageName}
      EndpointConfigName: !GetAtt EndpointConfig.EndpointConfigName

  # ── Auto-scaling ──────────────────────────────────────────────────────────

  AutoScalingTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    DependsOn: Endpoint
    Properties:
      MaxCapacity: !Ref EndpointMaxInstanceCount
      MinCapacity: !Ref EndpointInstanceCount
      ResourceId: !Sub endpoint/${Endpoint.EndpointName}/variant/AllTraffic
      RoleARN: !Sub >-
        arn:aws:iam::${AWS::AccountId}:role/aws-service-role/sagemaker.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_SageMakerEndpoint
      ScalableDimension: sagemaker:variant:DesiredInstanceCount
      ServiceNamespace: sagemaker

  AutoScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    DependsOn: AutoScalingTarget
    Properties:
      PolicyName: !Sub ${SageMakerProjectName}-${StageName}-scaling-policy
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref AutoScalingTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: !Ref TargetInvocationsPerInstance
        ScaleInCooldown: 600
        ScaleOutCooldown: 300
        PredefinedMetricSpecification:
          PredefinedMetricType: SageMakerVariantInvocationsPerInstance

  # ── CloudWatch Alarms ─────────────────────────────────────────────────────

  AlarmSnsTopic:
    Type: AWS::SNS::Topic
    Condition: HasAlarmEmail
    Properties:
      TopicName: !Sub ${SageMakerProjectName}-${StageName}-alarms
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlarmEmail

  ModelLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${SageMakerProjectName}-${StageName}-high-latency
      AlarmDescription: p99 model latency exceeded 1 second over a 15-minute window
      Namespace: AWS/SageMaker
      MetricName: ModelLatency
      Dimensions:
        - Name: EndpointName
          Value: !GetAtt Endpoint.EndpointName
        - Name: VariantName
          Value: AllTraffic
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 3
      Threshold: 1000000  # microseconds = 1 second
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmSnsTopic], []]
      OKActions: !If [HasAlarmEmail, [!Ref AlarmSnsTopic], []]

  Invocation5XXErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${SageMakerProjectName}-${StageName}-5xx-errors
      AlarmDescription: Endpoint is returning 5XX errors — likely a model/container issue
      Namespace: AWS/SageMaker
      MetricName: Invocation5XXErrors
      Dimensions:
        - Name: EndpointName
          Value: !GetAtt Endpoint.EndpointName
        - Name: VariantName
          Value: AllTraffic
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmSnsTopic], []]
      OKActions: !If [HasAlarmEmail, [!Ref AlarmSnsTopic], []]

  Invocation4XXErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${SageMakerProjectName}-${StageName}-4xx-errors
      AlarmDescription: Endpoint is returning 4XX errors — check input payload format
      Namespace: AWS/SageMaker
      MetricName: Invocation4XXErrors
      Dimensions:
        - Name: EndpointName
          Value: !GetAtt Endpoint.EndpointName
        - Name: VariantName
          Value: AllTraffic
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmSnsTopic], []]
      OKActions: !If [HasAlarmEmail, [!Ref AlarmSnsTopic], []]

  # ── Model Monitor ─────────────────────────────────────────────────────────
  # Enabled only when BaselineConstraintsUri and BaselineStatisticsUri are both provided.
  # Generate baseline files by running a SageMaker Model Monitor baseline job against
  # your training data before deploying to prod.

  MonitoringSchedule:
    Type: AWS::SageMaker::MonitoringSchedule
    Condition: HasBaseline
    DependsOn: Endpoint
    Properties:
      MonitoringScheduleName: !Sub ${SageMakerProjectName}-${StageName}-data-quality
      MonitoringScheduleConfig:
        ScheduleConfig:
          ScheduleExpression: "cron(0 * ? * * *)"  # hourly
        MonitoringJobDefinition:
          MonitoringInputs:
            - EndpointInput:
                EndpointName: !GetAtt Endpoint.EndpointName
                LocalPath: /opt/ml/processing/input/endpoint
          MonitoringOutputConfig:
            MonitoringOutputs:
              - S3Output:
                  LocalPath: /opt/ml/processing/output
                  S3Uri: !Sub "${DataCaptureUploadPath}/monitoring-output"
                  S3UploadMode: EndOfJob
          MonitoringResources:
            ClusterConfig:
              InstanceCount: 1
              InstanceType: ml.m5.large
              VolumeSizeInGB: 20
          MonitoringAppSpecification:
            ImageUri: !Ref ModelMonitorImageUri
          BaselineConfig:
            ConstraintsResource:
              S3Uri: !Ref BaselineConstraintsUri
            StatisticsResource:
              S3Uri: !Ref BaselineStatisticsUri
          StoppingCondition:
            MaxRuntimeInSeconds: 1800
          RoleArn: !Ref ModelExecutionRoleArn
